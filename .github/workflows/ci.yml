name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type Check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Format Check
        run: npx prettier --check 'src/**/*.ts' 'test/**/*.ts'

      - name: Check Bundle Size
        run: |
          MAX_SIZE=$((1024 * 1024))
          ACTUAL_SIZE=$(stat -c%s release/main.js)
          echo "Bundle size: $((ACTUAL_SIZE / 1024)) KB"
          if [ $ACTUAL_SIZE -gt $MAX_SIZE ]; then
            echo "Bundle size exceeds 1MB limit"
            exit 1
          fi
          echo "Bundle size OK"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-commander-build
          path: |
            release/main.js
            release/manifest.json
            release/styles.css

  release-draft:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci && npm run build
      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
